<!DOCTYPE html>

<html lang="pt" data-cvssn>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="color-scheme" content="light dark">

        <title>
            cvssn.12.e — ls.70
        </title>

        <style>
            [data-cvssn] {
                --bg: #000;
                --fg: #e0e3e6;
                --fg-dim: #aeb4ba;

                --accent: #1860ff;

                --line: #2a2e31;

                --font-ui: "Times New Roman", Times, serif;
            }

            @media (prefers-color-scheme: light) {
                [data-cvssn] {
                    --bg: #fff;
                    --fg: #0e1113;
                    --fg-dim: #4a5158;

                    --line: #d9dee2;
                }
            }

            *, *::before, *::after {
                box-sizing: border-box;
            }

            html, body {
                margin: 0;

                min-height: 100%;

                background: var(--bg);
                color: var(--fg);

                font-family: var(--font-ui);

                overflow: auto; /* clave */

                text-align: center;
            }

            /* header */
            header {
                position: fixed;

                top: 16px;
                left: 16px;

                z-index: 10;
            }

            header img {
                width: 44px;
            }

            /* layout */
            main {
                width: 100%;

                max-width: 760px;

                margin: 0 auto;

                padding: 80px 20px 60px;

                display: flex;

                flex-direction: column;

                align-items: center;

                gap: 20px;
            }

            h1 {
                margin: 0;

                text-transform: lowercase;

                font-size: 1.4rem;
                font-weight: 400;
            }

            h1 em {
                font-style: italic;
            }

            p {
                margin: 0;

                color: var(--fg-dim);

                font-size: 0.95rem;

                line-height: 1.5;
            }

            /* imagem */
            .portada {
                width: clamp(200px, 40vw, 320px);

                cursor: zoom-in;
            }

            /* form */
            form {
                width: 100%;
                max-width: 380px;

                display: grid;

                gap: 12px;
            }

            label {
                color: var(--fg-dim);

                text-transform: lowercase;
            }

            input, select {
                width: 100%;

                padding: .5rem;

                border: 1px solid var(--line);
                
                background: transparent;
                color: var(--fg);
            }

            button {
                border: 1px solid var(--accent);

                background: transparent;

                color: var(--fg);

                padding: .5rem;

                cursor: pointer;
            }

            #formNote {
                color: var(--fg-dim);
            }

            /* lightbox restaurado */
            #cvssn-lightbox {
                position: fixed;

                inset: 0;

                display: none;

                align-items: center;
                justify-content: center;

                background: rgba(0, 0, 0, .6);

                backdrop-filter: blur(8px);
            }

            #cvssn-lightbox.open {
                display: flex;
            }

            #cvssn-lightbox img {
                max-width: 90vw;
                max-height: 90vh;
            }
        </style>
    </head>

    <body>
        <header>
            <a href="https://cvssn.github.io">
                <img src="https://cvssn.github.io/svg/cavassani.svg">
            </a>
        </header>

        <main>
            <p>
                <a href="https://cvssn.github.io/arq.cvssn.12e.html" target="_blank" style="color: var(--accent); text-decoration: none;">
                    <em>
                        cvssn.12.e
                    </em>
                </a> apresenta <br>

                <em>
                    ls.70
                </em> [sessão de escuta n.º 70]
            </p>

            <p>
                [álbum] play <br>
                [artista] lilen <br>
                [ano] 2026 <br>
                [fecha] 30.03.26 / 17:00 — 18:00 hrs <br>
                [localização] <em>projetos públicos</em>
            </p>

            <img class="portada" id="portada" src="https://d2w9rnfcy7mm78.cloudfront.net/44786144/original_d8a8ebb1e17efa288f15661e02102723.jpg?1774560509?bc=0">

            <form action="https://script.google.com/macros/s/AKfycbwa8gSfG_hWuax6J_YghCkbXYtxv2np28jz6rFh0jAddzHL2voje2DUGGKtpkRc1rUm/exec" method="post">
                <label>
                    nome completo:
                </label>

                <input name="nome" id="nome" required>

                <label>
                    email:
                </label>

                <input name="email" id="email" type="email" required>

                <label>
                    horário:
                </label>

                <select name="horario" id="horario" required>
                    <option value="">
                        escolher hora
                    </option>

                    <option value="17:00">
                        17:00 hrs
                    </option>

                    <option value="18:00">
                        18:00 hrs
                    </option>
                </select>

                <input type="hidden" name="user_agent" id="ua">
                <input type="hidden" name="page" id="page">

                <p id="formNote"></p>

                <button type="submit" id="btnSubmit">
                    enviar
                </button>
            </form>
        </main>

        <div id="cvssn-lightbox">
            <img id="lb-img">
        </div>

        <script>
            document.getElementById("ua").value = navigator.userAgent;
            document.getElementById("page").value = location.href;

            const form = document.querySelector("form");
            const btn = document.getElementById("btnSubmit");
            const note = document.getElementById("formNote");

            form.addEventListener("submit", async(e) => {
                e.preventDefault();

                const nome = document.getElementById("nome").value.trim();
                const email = document.getElementById("email").value.trim();
                const horario = document.getElementById("horario").value;

                if (!nome || !email || !horario) {
                    note.textContent="complete todos os campos";

                    return;
                }

                btn.disabled = true;
                
                note.textContent = "procesando…";

                try {
                    const res = await fetch(form.action, {
                        method: "POST",
                        body: new FormData(form)
                    });

                    const data = await res.json();
                } catch {
                    note.textContent = "erro de red";
                }

                btn.disabled = false;
            });

            /* lightbox */
            const portada = document.getElementById("portada");
            const lb = document.getElementById("cvssn-lightbox");
            const lbImg = document.getElementById("lb-img");

            portada.addEventListener("click", () => {
                lb.classList.add("open");

                lbImg.src = portada.src;
            });

            lb.addEventListener("click", () => {
                lb.classList.remove("open");
            });
        </script>
    </body>
</html>
