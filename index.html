        <meta name="color-scheme" content="light dark">

        <title>

        <style>
            [data-cvssn] {
                --bg: #000;
                --fg: #e0e3e6;
                --fg-dim: #aeb4ba;
                
                --accent: #1860ff;

                --line: #2a2e31;
                --line-weak: #1a1d20;

                --star-opacity: .12;

                --font-ui: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            @media (prefers-color-scheme: light) {
                [data-cvssn] {
                    --bg: #fff;
                    --fg: #0e1113;
                    --fg-dim: #4a5158;
                    
                    --line: #d9dee2;
                    --line-weak: #eceff2;

                    --star-opacity: .05;
                }
            }

            *, *::before, *::after {
                box-sizing: border-box;
            }
        </style>
    </head>
