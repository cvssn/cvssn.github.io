<!DOCTYPE html>

<html lang="pt-BR" data-cvssn>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <meta name="color-scheme" content="light dark">

        <title>
            cavassani
        </title>

        <style>
            [data-cvssn] {
                --bg: #000;
                --fg: #e0e3e6;
                --fg-dim: #aeb4ba;
                
                --accent: #1860ff;

                --line: #2a2e31;
                --line-weak: #1a1d20;

                --star-opacity: .12;

                --font-ui: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            @media (prefers-color-scheme: light) {
                [data-cvssn] {
                    --bg: #fff;
                    --fg: #0e1113;
                    --fg-dim: #4a5158;
                    
                    --line: #d9dee2;
                    --line-weak: #eceff2;

                    --star-opacity: .05;
                }
            }

            *, *::before, *::after {
                box-sizing: border-box;
            }

            html, body {
                margin: 0;

                background: var(--bg);
                color: var(--fg);

                font-family: var(--font-ui);
                
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;

                height: 100%;

                overflow: hidden;
            }

            a {
                color: var(--fg);

                text-decoration: none;

                border-bottom: 1px solid transparent;

                transition: border-color .15s linear;
            }

            a:hover {
                border-bottom-color: var(--accent);
            }

            html {
                visibility: hidden;
            }

            /* ===== logo ===== */
            .logo {
                position: absolute;

                transform: translate(-50%, -50%);

                width: 66px;
                height: auto;

                z-index: 5;

                cursor: pointer;
            }

            .logo img {
                width: 100%;
                height: auto;

                display: block;

                filter: invert(1) brightness(100%);

                transition: filter .3s linear;
            }

            @media (prefers-color-scheme: light) {
                .logo img {
                    filter: none;
                }
            }
        </style>
    </head>

    <body>
        <!-- logo -->
        <div class="logo" id="logo">
            <img src="cavassani.svg" alt="cavassani logo">
        </div>

        <!-- links -->

        <!-- overlay -->

        <div class="lang lang-pt active">
            <p>
                
            </p>
        </div>

        <!-- en -->

</html>
