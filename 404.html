<!DOCTYPE html>

<html lang="pt" data-cvssn>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="color-scheme" content="light dark">

        <title>
            cvssn.github.io — 404
        </title>

        <style>
            :root {
                --bg: #0c0d0f;
                --fg: #e0e3e6;
                
                --line: #2a2e31;

                --header-h: 64px;
                
                --pad: clamp(12px, 3vw, 32px);
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: #f6f8fa;
                    --fg: #0e1113;

                    --line: #d9dee2;
                }
            }

            * {
                box-sizing: border-box;
            }

            html, body {
                height: 100%;

                margin: 0;
            }

            a {
                color: inherit;

                text-decoration: none;
            }

            body #error {
                background: var(--bg);
                color: var(--fg);

                font-family: "Times New Roman", serif;
                
                display: grid;
                
                grid-template-rows: var(--header-h) 1fr;
                
                min-height: 100svh;
            }

            header {
                display: flex;
                align-items: center;

                padding: 0 max(var(--pad), env(safe-area-inset-left)) 0 max(var(--pad), env(safe-area-inset-left));

                border-bottom: 1px solid var(--line);
                
                height: var(--header-h);
                
                position: sticky;
                
                top: 0;
                left: 0;
                right: 0;

                background: transparent;
                
                z-index: 10;
            }

            header a {
                display: inline-flex;
                
                align-items: center;
            }

            header img {
                width: 46px;
                height: auto;
                
                display: block;
                
                filter: invert(1) contrast(1.08);
            }

            @media (prefers-color-scheme: light) {
                header img {
                    filter: none;
                }
            }

            article {
                display: grid;
                
                place-items: center;
                
                padding: max(var(--pad), env(safe-area-inset-top)) max(var(--pad), env(safe-area-inset-right)) max(var(--pad), env(safe-area-inset-bottom)) max(var(--pad), env(safe-area-inset-left));
            }

            article img {
                width: min(520px, 70vw);
                height: auto;
                
                display: block;
                
                image-rendering: -webkit-optimize-contrast;

                filter: invert(1);
                
                transition: filter .3s ease;
            }

            @media (prefers-color-scheme: light) {
                article img {
                    filter: none;
                }
            }
        </style>
    </head>

    <body id="error">
        <header aria-label="cvssn">
            <a href="https://cvssn.github.io">
                <img src="./svg/cavassani.svg" alt="cvssn">
            </a>
        </header>

        <article aria-labelledby="t404">
            <img src="./svg/404.svg" alt="404 — recurso não encontrado" id="t404">
        </article>
    </body>
</html>
